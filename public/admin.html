<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skill Arena - Admin</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1526;
      color: white;
      padding: 20px;
      margin: 0;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 { color: #28a745; text-align: center; }
    
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: #16213e;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }
    
    input {
      padding: 12px;
      width: 80%;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }
    
    button {
      padding: 12px 30px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    
    button:hover { background: #218838; }
    
    .dashboard { display: none; }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .card {
      background: #16213e;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #28a745;
    }
    
    .card h3 { margin-top: 0; color: #28a745; }
    
    .balance {
      font-size: 2.5em;
      font-weight: bold;
      color: #28a745;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    
    th { color: #28a745; }
    
    .room-item {
      background: #0f1526;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }
    
    .transaction {
      background: #0f1526;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border-left: 3px solid #ffc107;
    }
    
    .refresh-btn {
      background: #007bff;
      margin-bottom: 20px;
    }
    
    .logout-btn {
      background: #dc3545;
      float: right;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- LOGIN -->
  <div id="login" class="login-box">
    <h1>🔐 Admin Panel</h1>
    <input type="password" id="adminPassword" placeholder="Senha de Admin">
    <br>
    <button onclick="login()">Entrar</button>
    <p id="loginError" style="color: #ff6b6b; display: none;">Senha incorreta!</p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard">
    <button class="logout-btn" onclick="logout()">Sair</button>
    <h1>🎲 Skill Arena - Admin</h1>
    
    <button class="refresh-btn" onclick="fetchData()">🔄 Atualizar Dados</button>
    
    <div class="cards">
      <!-- SALDO DA CASA -->
      <div class="card">
        <h3>💰 Saldo da Casa</h3>
        <div class="balance" id="houseBalance">R$ 0</div>
        <p style="color: #888; font-size: 0.9em;">30% de cada partida vencedora</p>
      </div>

      <!-- SALAS ATIVAS -->
      <div class="card">
        <h3>🎮 Salas Ativas</h3>
        <div id="roomsList">
          <p style="color: #888;">Nenhuma sala ativa</p>
        </div>
      </div>

      <!-- HISTÓRICO -->
      <div class="card" style="grid-column: 1 / -1;">
        <h3>📜 Histórico de Transações</h3>
        <div id="transactionsList">
          <p style="color: #888;">Nenhuma transação registrada</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let isAdmin = false

// LOGIN
async function login() {
  const password = document.getElementById("adminPassword").value
  
  try {
    const response = await fetch("/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    })
    
    const data = await response.json()
    
    if (data.ok) {
      isAdmin = true
      document.getElementById("login").style.display = "none"
      document.getElementById("dashboard").style.display = "block"
      fetchData()
      
      // Atualiza a cada 5 segundos
      setInterval(fetchData, 5000)
    } else {
      document.getElementById("loginError").style.display = "block"
    }
  } catch (error) {
    console.error("Erro no login:", error)
    alert("Erro de conexão com o servidor")
  }
}

function logout() {
  isAdmin = false
  document.getElementById("login").style.display = "block"
  document.getElementById("dashboard").style.display = "none"
  document.getElementById("adminPassword").value = ""
}

// BUSCAR DADOS
async function fetchData() {
  if (!isAdmin) return
  
  try {
    const response = await fetch("/admin/data")
    const data = await response.json()
    
    // Atualiza Saldo
    document.getElementById("houseBalance").innerText = 
      "R$ " + data.houseBalance.toFixed(2)
    
    // Atualiza Salas
    const roomsList = document.getElementById("roomsList")
    const rooms = Object.values(data.rooms)
    
    if (rooms.length === 0) {
      roomsList.innerHTML = '<p style="color: #888;">Nenhuma sala ativa</p>'
    } else {
      roomsList.innerHTML = rooms.map(room => `
        <div class="room-item">
          <span><strong>Sala ${room.code}</strong></span>
          <span>Aposta: R$ ${room.stake}</span>
          <span>${room.started ? '🎮 Em jogo' : '⏳ Aguardando'}</span>
        </div>
      `).join('')
    }
    
    // Atualiza Histórico
    const transactionsList = document.getElementById("transactionsList")
    
    if (data.transactions.length === 0) {
      transactionsList.innerHTML = '<p style="color: #888;">Nenhuma transação registrada</p>'
    } else {
      // Mostra as últimas 10 transações
      const recent = data.transactions.slice(-10).reverse()
      transactionsList.innerHTML = recent.map(t => `
        <div class="transaction">
          <strong>Sala ${t.room}</strong> - Vencedor: ${t.winner}<br>
          <span style="color: #28a745;">+R$ ${t.winnerShare.toFixed(2)}</span> 
          <span style="color: #ffc107;">| Casa: +R$ ${t.houseShare.toFixed(2)}</span>
        </div>
      `).join('')
    }
    
  } catch (error) {
    console.error("Erro ao buscar dados:", error)
  }
}

// Enter para login
document.getElementById("adminPassword").addEventListener("keypress", function(e) {
  if (e.key === "Enter") login()
})
</script>

</body>
</html>
