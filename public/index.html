<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dominó</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white; 
      padding: 5px;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .card { 
      background: rgba(0,0,0,0.8); 
      border-radius: 15px; 
      padding: 15px; 
      max-width: 400px; 
      margin: 20px auto; 
      border: 2px solid rgba(255,215,0,0.3);
    }
    h1 { text-align: center; color: #ffd700; margin-bottom: 15px; font-size: 1.5em; }
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border-radius: 8px; 
      border: 2px solid #ffd700; 
      background: rgba(0,0,0,0.6); 
      color: white;
      font-size: 16px;
    }
    button { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0; 
      border: none; 
      border-radius: 8px; 
      font-weight: bold; 
      cursor: pointer;
      font-size: 16px;
    }
    .btn-green { background: linear-gradient(135deg, #28a745, #1e7e34); color: white; }
    .btn-blue { background: linear-gradient(135deg, #007bff, #0056b3); color: white; }
    .btn-red { background: linear-gradient(135deg, #dc3545, #c82333); color: white; font-size: 18px; }
    .btn-yellow { background: linear-gradient(135deg, #ffc107, #ff9800); color: black; }
    .btn-left { background: linear-gradient(135deg, #17a2b8, #117a8b); color: white; }
    .btn-right { background: linear-gradient(135deg, #6610f2, #520dc2); color: white; }
    .hidden { display: none; }
    #rooms { list-style: none; }
    #rooms li { 
      padding: 10px; 
      margin: 5px 0; 
      background: rgba(255,255,255,0.1); 
      border-radius: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    
    .player-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      background: rgba(0,0,0,0.6); 
      padding: 10px; 
      border-radius: 10px; 
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .deck-pile { 
      width: 45px; 
      height: 65px; 
      background: linear-gradient(135deg, #2d5a3d, #1a472a);
      border: 3px dashed #ffd700; 
      border-radius: 8px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #ffd700; 
      font-weight: bold; 
      cursor: pointer;
      font-size: 16px;
    }
    
    #turn { 
      text-align: center; 
      padding: 12px; 
      background: rgba(0,0,0,0.6); 
      border-radius: 10px; 
      margin: 10px 0; 
      font-weight: bold;
    }
    #turn.active { background: linear-gradient(135deg, #28a745, #1e7e34); }
    
    .board-container { 
      background: #1a472a;
      background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 10px);
      border: 6px solid #3d2817;
      border-radius: 10px;
      padding: 10px; 
      margin: 10px 0; 
      overflow-x: auto;
      width: 100%;
    }
    
    .board-title {
      text-align: center;
      color: #ffd700;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .board { 
      display: flex; 
      align-items: center;
      gap: 3px; 
      min-height: 60px; 
      padding: 10px;
      min-width: max-content;
    }
    
    /* 🔥 DOMINÓ NA MESA - TODAS HORIZONTAIS (SIMPLES) */
    .domino-board { 
      width: 30px; 
      height: 50px; 
      background: linear-gradient(145deg, #fef9e7, #e8e8c8);
      border-radius: 4px; 
      display: flex; 
      flex-direction: column; 
      border: 1px solid #8b7355; 
      flex-shrink: 0;
      box-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }
    
    .domino-board.horizontal { 
      width: 50px; 
      height: 30px; 
      flex-direction: row; 
    }
    
    .domino-face { 
      flex: 1; 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      grid-template-rows: repeat(3, 1fr); 
      padding: 2px; 
      gap: 1px; 
    }
    
    .domino-face.top { border-bottom: 1px solid #8b7355; }
    .domino-board.horizontal .domino-face.top { border-bottom: none; border-right: 1px solid #8b7355; }
    
    .pip { 
      background: #000; 
      border-radius: 50%; 
      width: 4px; 
      height: 4px; 
      justify-self: center; 
      align-self: center; 
      display: none; 
    }
    .v0 .pip { display: none; }
    .v1 .p5 { display: block; }
    .v2 .p1, .v2 .p9 { display: block; }
    .v3 .p1, .v3 .p5, .v3 .p9 { display: block; }
    .v4 .p1, .v4 .p3, .v4 .p7, .v4 .p9 { display: block; }
    .v5 .p1, .v5 .p3, .v5 .p5, .v5 .p7, .v5 .p9 { display: block; }
    .v6 .p1, .v6 .p3, .v6 .p4, .v6 .p6, .v6 .p7, .v6 .p9 { display: block; }
    
    /* 🔥 DOMINÓ NA MÃO - CLICÁVEL */
    .hand { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 5px; 
      justify-content: center; 
      min-height: 60px; 
      background: rgba(0,0,0,0.4); 
      border-radius: 10px; 
      padding: 8px; 
    }
    
    .domino-hand { 
      width: 32px; 
      height: 55px; 
      background: linear-gradient(145deg, #fef9e7, #e8e8c8);
      border-radius: 5px; 
      display: flex; 
      flex-direction: column; 
      cursor: pointer; 
      border: 2px solid #8b7355; 
      flex-shrink: 0;
      transition: all 0.2s;
    }
    
    .domino-hand:hover { 
      transform: translateY(-2px); 
      border-color: #ffd700;
    }
    
    /* 🔥 PEDRA SELECIONADA */
    .domino-hand.selected { 
      border-color: #ffd700;
      box-shadow: 0 0 15px #ffd700;
      transform: translateY(-5px);
    }
    
    .domino-hand .domino-face { 
      flex: 1; 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      grid-template-rows: repeat(3, 1fr); 
      padding: 3px; 
      gap: 2px; 
    }
    
    .domino-hand .domino-face.top { border-bottom: 2px solid #8b7355; }
    
    /* 🔥 BOTÕES DE JOGADA */
    #play-buttons {
      display: none;
      gap: 8px;
      justify-content: center;
      margin: 10px 0;
      flex-wrap: wrap;
      animation: fadeIn 0.3s;
    }
    
    #play-buttons.show {
      display: flex;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    #play-buttons button {
      width: auto;
      padding: 10px 20px;
      font-size: 13px;
    }
    
    #action-buttons { 
      display: flex; 
      gap: 8px; 
      justify-content: center; 
      margin: 10px 0;
      flex-wrap: wrap;
    }
    #action-buttons button { 
      width: auto; 
      padding: 10px 18px;
      font-size: 13px;
    }

    @media (min-width: 600px) {
      body { padding: 10px; }
      .card { padding: 20px; max-width: 500px; }
      h1 { font-size: 2em; }
      .domino-hand { width: 38px; height: 65px; }
      .domino-board { width: 35px; height: 58px; }
      .domino-board.horizontal { width: 58px; height: 35px; }
      .pip { width: 5px; height: 5px; }
      .deck-pile { width: 55px; height: 75px; }
    }

    @media (min-width: 1024px) {
      body { padding: 20px; }
      .card { padding: 30px; max-width: 600px; }
      h1 { font-size: 2.5em; }
      .domino-hand { width: 45px; height: 78px; }
      .domino-board { width: 42px; height: 70px; }
      .domino-board.horizontal { width: 70px; height: 42px; }
      .pip { width: 6px; height: 6px; }
      .deck-pile { width: 65px; height: 90px; }
    }
  </style>
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="card">
    <h1>🎲 Dominó</h1>
    <input id="username" placeholder="Seu nome">
    <button class="btn-green" onclick="register()">Entrar</button>
  </div>
</div>

<div id="menu-screen" class="screen">
  <div class="card">
    <h1>🎲 Dominó</h1>
    <button class="btn-green" onclick="createRoom()">Criar Sala</button>
    <h3 style="color:#ffd700;margin-top:15px;">Salas</h3>
    <ul id="rooms"></ul>
    <p id="myRoomCode" style="color:#ffd700;text-align:center;margin-top:15px;"></p>
  </div>
</div>

<div id="wait-screen" class="screen">
  <div class="card">
    <h1>⏳ Aguardando</h1>
    <p id="waitMessage" style="font-size:1.2em;margin:20px 0;">...</p>
    <button id="startBtn" class="btn-red hidden" onclick="startGame()">🚀 INICIAR</button>
  </div>
</div>

<div id="game-screen" class="screen">
  <div class="player-bar">
    <div>👤 Você: <b id="myCount" style="color:#28a745">7</b></div>
    <div class="deck-pile" id="deckPile" onclick="buyTile()"><span id="deckCount">14</span></div>
    <div>👤 Oponente: <b id="oppCount" style="color:#dc3545">7</b></div>
  </div>
  <div id="turn">⏳ Aguardando...</div>
  
  <!-- 🔥 BOTÕES DE JOGADA (APARECEM AO SELECIONAR PEDRA) -->
  <div id="play-buttons">
    <button class="btn-left" onclick="playTile('left')">⬅️ Esquerda</button>
    <button class="btn-right" onclick="playTile('right')">➡️ Direita</button>
    <button class="btn-yellow" onclick="cancelSelect()">❌ Cancelar</button>
  </div>
  
  <div id="action-buttons" class="hidden">
    <button class="btn-blue" onclick="buyTile()">🛒 Comprar</button>
    <button class="btn-yellow hidden" id="passBtn" onclick="passTurn()">⏭️ Passar</button>
  </div>
  
  <div class="board-container">
    <div class="board-title">📌 Mesa</div>
    <div class="board" id="boardTiles"></div>
  </div>
  
  <h3 style="text-align:center;color:#ffd700;font-size:14px;margin:10px 0 5px;">🎮 Sua Mão (toque para selecionar)</h3>
  <div class="hand" id="hand"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
let room = null, myId = null, myTurn = false, isHost = false, hand = [], deck = 14
let selectedTile = null // 🔥 PEDRA SELECIONADA

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

// 🔥 RENDERIZA PEDRA NA MESA
function createDominoBoard(v1, v2, horizontal = false) {
  const n1 = parseInt(v1), n2 = parseInt(v2)
  const pips = '<div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div><div class="pip p6"></div><div class="pip p7"></div><div class="pip p8"></div><div class="pip p9"></div>'
  const f1 = '<div class="domino-face top v' + n1 + '">' + pips + '</div>'
  const f2 = '<div class="domino-face bottom v' + n2 + '">' + pips + '</div>'
  return '<div class="domino-board ' + (horizontal ? 'horizontal' : '') + '">' + f1 + f2 + '</div>'
}

// 🔥 RENDERIZA PEDRA NA MÃO (CLICÁVEL)
function createDominoHand(v1, v2, index) {
  const n1 = parseInt(v1), n2 = parseInt(v2)
  const pips = '<div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div><div class="pip p6"></div><div class="pip p7"></div><div class="pip p8"></div><div class="pip p9"></div>'
  const f1 = '<div class="domino-face top v' + n1 + '">' + pips + '</div>'
  const f2 = '<div class="domino-face bottom v' + n2 + '">' + pips + '</div>'
  const selected = (selectedTile && selectedTile.index === index) ? ' selected' : ''
  return '<div class="domino-hand' + selected + '" onclick="selectTile(' + index + ')">' + f1 + f2 + '</div>'
}

// 🔥 SELECIONAR PEDRA
function selectTile(index) {
  if (!myTurn) return
  selectedTile = { index: index, ...hand[index] }
  renderHand()
  showPlayButtons()
}

// 🔥 MOSTRAR BOTÕES DE JOGADA
function showPlayButtons() {
  document.getElementById('play-buttons').classList.add('show')
  document.getElementById('action-buttons').classList.add('hidden')
}

// 🔥 ESCONDER BOTÕES DE JOGADA
function hidePlayButtons() {
  document.getElementById('play-buttons').classList.remove('show')
}

// 🔥 CANCELAR SELEÇÃO
function cancelSelect() {
  selectedTile = null
  renderHand()
  hidePlayButtons()
  checkMovesForButtons()
}

// 🔥 JOGAR PEDRA SELECIONADA
function playTile(side) {
  if (!selectedTile || !myTurn || !room) return
  socket.emit('play', { 
    code: room, 
    tile: [selectedTile[0], selectedTile[1]], 
    side: side 
  })
  selectedTile = null
  hidePlayButtons()
}

function register() {
  const u = document.getElementById('username').value
  if (!u) return alert('Nome!')
  socket.emit('register', u)
}

socket.on('registered', (data) => {
  myId = data.id
  showScreen('menu-screen')
})

function createRoom() {
  socket.emit('createRoom')
}

socket.on('roomCreated', (data) => {
  room = data.code
  isHost = true
  document.getElementById('myRoomCode').innerText = 'Sua sala: ' + room
  showScreen('wait-screen')
  document.getElementById('waitMessage').innerText = '👑 Aguardando...'
  document.getElementById('startBtn').classList.add('hidden')
})

socket.on('roomList', (rooms) => {
  const ul = document.getElementById('rooms')
  ul.innerHTML = ''
  if (rooms.length === 0) { ul.innerHTML = '<li style="color:#888">Nenhuma</li>'; return }
  rooms.forEach(r => {
    const st = r.players >= 2 ? '🔴 Cheia' : '🟡 ' + r.players + '/2'
    ul.innerHTML += '<li><span><b>' + r.code + '</b> (' + st + ')</span><button class="btn-blue" style="width:auto;padding:5px 10px;" ' + (r.players >= 2 ? 'disabled' : '') + ' onclick="joinRoom(\'' + r.code + '\')">Entrar</button></li>'
  })
})

function joinRoom(code) {
  socket.emit('joinRoom', code)
}

socket.on('roomJoined', (data) => {
  room = data.code
  isHost = false
  showScreen('wait-screen')
  document.getElementById('waitMessage').innerText = '🎲 Aguardando host...'
  document.getElementById('startBtn').classList.add('hidden')
})

socket.on('guestJoined', () => {
  if (isHost) {
    document.getElementById('waitMessage').innerText = '✅ Convidado entrou!'
    document.getElementById('startBtn').classList.remove('hidden')
  }
})

function startGame() {
  if (!room) { alert('Erro: Sala não identificada!'); return }
  socket.emit('startGame', room)
}

socket.on('gameStart', (data) => {
  hand = data.hand
  deck = data.deckCount
  showScreen('game-screen')
  updateTurn('🎮 Jogo Iniciado!')
  renderHand()
  document.getElementById('action-buttons').classList.add('hidden')
  document.getElementById('myCount').innerText = hand.length
  document.getElementById('deckCount').innerText = deck
})

socket.on('tilePlayed', (data) => {
  hand = data.hand
  deck = data.deckCount
  selectedTile = null
  renderHand()
  hidePlayButtons()
  document.getElementById('myCount').innerText = hand.length
  document.getElementById('deckCount').innerText = deck
  renderBoard(data.board)
  if (data.turn === myId) {
    updateTurn('✅ SUA VEZ!')
    myTurn = true
    checkMovesForButtons()
  } else {
    updateTurn('⏳ Oponente...')
    myTurn = false
    document.getElementById('action-buttons').classList.add('hidden')
  }
})

socket.on('tileBought', (data) => {
  hand = data.hand
  deck = data.deckCount
  selectedTile = null
  renderHand()
  hidePlayButtons()
  document.getElementById('myCount').innerText = hand.length
  document.getElementById('deckCount').innerText = deck
  checkMovesForButtons()
})

socket.on('update', (data) => {
  renderBoard(data.board)
  if (data.deckCount !== undefined) {
    deck = data.deckCount
    document.getElementById('deckCount').innerText = deck
  }
  if (data.turn === myId) {
    updateTurn('✅ SUA VEZ!')
    myTurn = true
    checkMovesForButtons()
  } else {
    updateTurn('⏳ Oponente...')
    myTurn = false
    document.getElementById('action-buttons').classList.add('hidden')
  }
})

function getBoardEnds(board) {
  if (!board || board.length === 0) return { left: null, right: null }
  const first = board[0]
  const last = board[board.length - 1]
  const left = Array.isArray(first) ? first[0] : (first.values ? first.values[0] : null)
  const right = Array.isArray(last) ? last[1] : (last.values ? last.values[1] : null)
  return { left, right }
}

// 🔥 VERIFICA SE PODE JOGAR (PARA MOSTRAR BOTÕES)
function checkMovesForButtons() {
  const board = [] // Será atualizado pelo socket
  const act = document.getElementById('action-buttons')
  const buy = act.querySelector('.btn-blue')
  const pass = document.getElementById('passBtn')
  
  // Pede ao servidor para verificar
  socket.emit('checkMoves', { code: room })
}

socket.on('canPlay', (data) => {
  const act = document.getElementById('action-buttons')
  const buy = act.querySelector('.btn-blue')
  const pass = document.getElementById('passBtn')
  
  if (data.can) {
    act.classList.add('hidden')
  } else {
    act.classList.remove('hidden')
    if (data.deck > 0) {
      buy.classList.remove('hidden')
      pass.classList.add('hidden')
      updateTurn('⚠️ Compre!')
    } else {
      buy.classList.add('hidden')
      pass.classList.remove('hidden')
      updateTurn('⚠️ Passe!')
    }
  }
})

function buyTile() {
  if (myTurn && room) {
    socket.emit('buyTile', { code: room })
    document.getElementById('action-buttons').classList.add('hidden')
  }
}

function passTurn() {
  if (myTurn && room) {
    socket.emit('passTurn', { code: room })
    document.getElementById('action-buttons').classList.add('hidden')
  }
}

function renderHand() {
  if (!hand || !Array.isArray(hand)) return
  document.getElementById('hand').innerHTML = hand.map((t, i) => createDominoHand(t[0], t[1], i)).join('')
}

function renderBoard(b) {
  if (!b || !Array.isArray(b)) return
  document.getElementById('boardTiles').innerHTML = b.map(t => {
    if (!t) return ''
    if (Array.isArray(t)) {
      return createDominoBoard(t[0], t[1], false)
    } else if (t.values) {
      return createDominoBoard(t.values[0], t.values[1], t.rotation === 'vertical')
    }
    return ''
  }).join('')
}

function updateTurn(m) {
  const el = document.getElementById('turn')
  el.innerText = m
  el.classList.toggle('active', m.includes('SUA VEZ'))
}

socket.on('error', (data) => { 
  alert('Erro: ' + data.message)
  cancelSelect()
})
socket.on('gameOver', () => { alert('🏆 Fim de jogo!'); location.reload() })
</script>
</body>
</html>
