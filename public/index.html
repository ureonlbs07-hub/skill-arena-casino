<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dominó</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white; 
      padding: 5px;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: manipulation;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .card { 
      background: rgba(0,0,0,0.8); 
      border-radius: 15px; 
      padding: 15px; 
      max-width: 400px; 
      margin: 20px auto; 
      border: 2px solid rgba(255,215,0,0.3);
    }
    h1 { text-align: center; color: #ffd700; margin-bottom: 15px; font-size: 1.5em; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border-radius: 8px; 
      border: 2px solid #ffd700; 
      background: rgba(0,0,0,0.6); 
      color: white;
      font-size: 16px;
    }
    button { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0; 
      border: none; 
      border-radius: 8px; 
      font-weight: bold; 
      cursor: pointer;
      font-size: 16px;
    }
    .btn-green { background: linear-gradient(135deg, #28a745, #1e7e34); color: white; }
    .btn-blue { background: linear-gradient(135deg, #007bff, #0056b3); color: white; }
    .btn-red { background: linear-gradient(135deg, #dc3545, #c82333); color: white; font-size: 18px; }
    .btn-yellow { background: linear-gradient(135deg, #ffc107, #ff9800); color: black; }
    .hidden { display: none; }
    #rooms { list-style: none; }
    #rooms li { 
      padding: 10px; 
      margin: 5px 0; 
      background: rgba(255,255,255,0.1); 
      border-radius: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    
    .player-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      background: rgba(0,0,0,0.6); 
      padding: 10px; 
      border-radius: 10px; 
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid rgba(255,215,0,0.2);
    }
    .deck-pile { 
      width: 45px; 
      height: 65px; 
      background: linear-gradient(135deg, #2d5a3d, #1a472a);
      border: 3px dashed #ffd700; 
      border-radius: 8px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #ffd700; 
      font-weight: bold; 
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }
    
    #turn { 
      text-align: center; 
      padding: 12px; 
      background: rgba(0,0,0,0.6); 
      border-radius: 10px; 
      margin: 10px 0; 
      font-weight: bold;
      border: 1px solid rgba(255,215,0,0.2);
    }
    #turn.active { 
      background: linear-gradient(135deg, #28a745, #1e7e34);
      box-shadow: 0 0 20px rgba(40,167,69,0.5);
    }
    
    /* 🔥 MESA REALISTA */
    .board-container { 
      background: #1a472a;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 70%),
        repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 10px);
      border: 8px solid #3d2817;
      border-radius: 15px;
      padding: 15px; 
      margin: 10px 0; 
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      box-shadow: 
        inset 0 0 50px rgba(0,0,0,0.6),
        0 5px 20px rgba(0,0,0,0.5),
        0 0 0 2px rgba(255,215,0,0.1);
      position: relative;
    }
    
    .board-title {
      text-align: center;
      color: #ffd700;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
      letter-spacing: 2px;
    }
    
    .board { 
      display: flex; 
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px; 
      min-height: 100px; 
      padding: 15px;
      min-width: max-content;
      background: rgba(0,0,0,0.1);
      border-radius: 10px;
    }
    
    .drop-zone { 
      width: 35px; 
      height: 60px; 
      border: 2px dashed rgba(255,215,0,0.6); 
      border-radius: 6px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: rgba(255,215,0,0.8); 
      cursor: pointer; 
      flex-shrink: 0;
      font-size: 10px;
      background: rgba(255,215,0,0.05);
      transition: all 0.3s;
    }
    .drop-zone:hover { 
      background: rgba(255,215,0,0.2); 
      border-color: #ffd700;
      transform: scale(1.05);
    }
    .drop-zone.hidden { display: none; }
    
    /* 🔥 DOMINÓ COM ROTAÇÃO */
    .domino { 
      width: 35px; 
      height: 60px; 
      background: linear-gradient(145deg, #fef9e7 0%, #f5f5dc 40%, #e8e8c8 100%);
      border-radius: 6px; 
      display: flex; 
      flex-direction: column; 
      cursor: grab; 
      border: 2px solid #8b7355; 
      flex-shrink: 0;
      touch-action: none;
      user-select: none;
      box-shadow: 
        2px 2px 6px rgba(0,0,0,0.4),
        inset 0 0 10px rgba(0,0,0,0.05),
        0 0 0 1px rgba(255,255,255,0.3);
      position: relative;
      transition: all 0.2s;
    }
    
    .domino::before {
      content: '';
      position: absolute;
      top: 3px; left: 3px; right: 3px; bottom: 3px;
      border: 1px solid rgba(139,115,85,0.3);
      border-radius: 4px;
      pointer-events: none;
    }
    
    .domino:hover { 
      transform: translateY(-3px); 
      border-color: #ffd700;
      box-shadow: 
        2px 5px 15px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,215,0,0.5),
        0 0 10px rgba(255,215,0,0.3);
    }
    
    /* 🔥 ROTAÇÃO VERTICAL */
    .domino.vertical { 
      width: 60px; 
      height: 35px; 
      flex-direction: row;
    }
    
    .domino.horizontal { 
      width: 35px; 
      height: 60px; 
      flex-direction: column;
    }
    
    .domino.dragging { 
      opacity: 0.8; 
      transform: scale(1.15) rotate(3deg);
      z-index: 1000;
      cursor: grabbing;
    }
    
    .domino-face { 
      flex: 1; 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      grid-template-rows: repeat(3, 1fr); 
      padding: 3px; 
      gap: 2px; 
      position: relative;
    }
    
    .domino-face.top { 
      border-bottom: 2px solid #8b7355; 
      border-radius: 4px 4px 0 0;
    }
    
    .domino.vertical .domino-face.top { 
      border-bottom: none; 
      border-right: 2px solid #8b7355; 
      border-radius: 4px 0 0 4px; 
    }
    
    .domino-face.bottom { 
      border-radius: 0 0 4px 4px;
    }
    
    .domino.vertical .domino-face.bottom { 
      border-radius: 0 4px 4px 0;
    }
    
    .pip { 
      background: radial-gradient(circle at 35% 35%, #2a2a2a 0%, #000 100%);
      border-radius: 50%; 
      width: 5px; 
      height: 5px; 
      justify-self: center; 
      align-self: center; 
      display: none;
      box-shadow: inset 0 0 2px rgba(255,255,255,0.3);
    }
    .v0 .pip { display: none; }
    .v1 .p5 { display: block; }
    .v2 .p1, .v2 .p9 { display: block; }
    .v3 .p1, .v3 .p5, .v3 .p9 { display: block; }
    .v4 .p1, .v4 .p3, .v4 .p7, .v4 .p9 { display: block; }
    .v5 .p1, .v5 .p3, .v5 .p5, .v5 .p7, .v5 .p9 { display: block; }
    .v6 .p1, .v6 .p3, .v6 .p4, .v6 .p6, .v6 .p7, .v6 .p9 { display: block; }
    
    .hand { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 5px; 
      justify-content: center; 
      min-height: 65px; 
      background: rgba(0,0,0,0.4); 
      border-radius: 10px; 
      padding: 8px; 
    }
    #action-buttons { 
      display: flex; 
      gap: 8px; 
      justify-content: center; 
      margin: 8px 0;
      flex-wrap: wrap;
    }
    #action-buttons button { 
      width: auto; 
      padding: 10px 18px;
      font-size: 13px;
    }

    @media (min-width: 600px) {
      body { padding: 10px; }
      .card { padding: 20px; max-width: 500px; }
      h1 { font-size: 2em; }
      .domino.horizontal { width: 40px; height: 68px; }
      .domino.vertical { width: 68px; height: 40px; }
      .pip { width: 6px; height: 6px; }
      .deck-pile { width: 55px; height: 75px; }
      .drop-zone { width: 40px; height: 68px; }
      .board-container { min-height: 120px; padding: 20px; }
    }

    @media (min-width: 1024px) {
      body { padding: 20px; }
      .card { padding: 30px; max-width: 600px; }
      h1 { font-size: 2.5em; }
      .domino.horizontal { width: 48px; height: 82px; }
      .domino.vertical { width: 82px; height: 48px; }
      .pip { width: 7px; height: 7px; }
      .deck-pile { width: 65px; height: 90px; }
      .drop-zone { width: 48px; height: 82px; }
      .board-container { min-height: 150px; }
    }
  </style>
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="card">
    <h1>🎲 Dominó</h1>
    <input id="username" placeholder="Seu nome">
    <button class="btn-green" onclick="register()">Entrar</button>
  </div>
</div>

<div id="menu-screen" class="screen">
  <div class="card">
    <h1>🎲 Dominó</h1>
    <button class="btn-green" onclick="createRoom()">Criar Sala</button>
    <h3 style="color:#ffd700;margin-top:15px;">Salas</h3>
    <ul id="rooms"></ul>
    <p id="myRoomCode" style="color:#ffd700;text-align:center;margin-top:15px;"></p>
  </div>
</div>

<div id="wait-screen" class="screen">
  <div class="card">
    <h1>⏳ Aguardando</h1>
    <p id="waitMessage" style="font-size:1.2em;margin:20px 0;">...</p>
    <button id="startBtn" class="btn-red hidden" onclick="startGame()">🚀 INICIAR</button>
  </div>
</div>

<div id="game-screen" class="screen">
  <div class="player-bar">
    <div>👤 Você: <b id="myCount" style="color:#28a745">7</b></div>
    <div class="deck-pile" id="deckPile" onclick="buyTile()"><span id="deckCount">14</span></div>
    <div>👤 Oponente: <b id="oppCount" style="color:#dc3545">7</b></div>
  </div>
  <div id="turn">⏳ Aguardando...</div>
  <div id="action-buttons" class="hidden">
    <button class="btn-blue" onclick="buyTile()">🛒 Comprar</button>
    <button class="btn-yellow hidden" id="passBtn" onclick="passTurn()">⏭️ Passar</button>
  </div>
  <div class="board-container">
    <div class="board-title">📌 MESA</div>
    <div class="board">
      <div class="drop-zone hidden" id="dropLeft" ondragover="allowDrop(event)" ondrop="drop(event,'left')">⬅️</div>
      <div id="boardTiles" style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;"></div>
      <div class="drop-zone hidden" id="dropRight" ondragover="allowDrop(event)" ondrop="drop(event,'right')">➡️</div>
      <div class="drop-zone hidden" id="dropCenter" ondragover="allowDrop(event)" ondrop="drop(event,'center')">🎲</div>
    </div>
  </div>
  <h3 style="text-align:center;color:#ffd700;font-size:14px;">🎮 Sua Mão</h3>
  <div class="hand" id="hand"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
let room = null, myId = null, myTurn = false, isHost = false, draggedTile = null, draggedElement = null, hand = [], deck = 14, touchStartX = 0, touchStartY = 0

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

// 🔥 FUNÇÃO QUE RENDERIZA PEDRA COM ROTAÇÃO
function createDomino(v1, v2, rotation = 'horizontal', draggable = false) {
  const n1 = parseInt(v1), n2 = parseInt(v2)
  const pips = '<div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div><div class="pip p6"></div><div class="pip p7"></div><div class="pip p8"></div><div class="pip p9"></div>'
  const f1 = '<div class="domino-face top v' + n1 + '">' + pips + '</div>'
  const f2 = '<div class="domino-face bottom v' + n2 + '">' + pips + '</div>'
  const attrs = (draggable ? 'draggable="true" ondragstart="handleDrag(event)" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd(event)"' : '') + ' data-v1="' + n1 + '" data-v2="' + n2 + '"'
  return '<div class="domino ' + rotation + '" ' + attrs + '>' + f1 + f2 + '</div>'
}

function handleDrag(e) {
  if (!myTurn) return
  const v1 = e.target.getAttribute('data-v1')
  const v2 = e.target.getAttribute('data-v2')
  if (!v1 || !v2) return
  draggedTile = { v1: parseInt(v1), v2: parseInt(v2) }
  e.target.classList.add('dragging')
  draggedElement = e.target
}

function handleTouchStart(e) {
  if (!myTurn) return
  e.preventDefault()
  const touch = e.touches[0]
  const target = e.target.closest('.domino')
  if (!target) return
  const v1 = target.getAttribute('data-v1')
  const v2 = target.getAttribute('data-v2')
  if (!v1 || !v2) return
  draggedTile = { v1: parseInt(v1), v2: parseInt(v2) }
  draggedElement = target
  touchStartX = touch.clientX
  touchStartY = touch.clientY
  target.classList.add('dragging')
  target.style.position = 'fixed'
  target.style.left = (touch.clientX - 18) + 'px'
  target.style.top = (touch.clientY - 30) + 'px'
  target.style.zIndex = '1000'
}

function handleTouchMove(e) {
  if (!draggedElement) return
  e.preventDefault()
  const touch = e.touches[0]
  draggedElement.style.left = (touch.clientX - 18) + 'px'
  draggedElement.style.top = (touch.clientY - 30) + 'px'
}

function handleTouchEnd(e) {
  if (!draggedElement) return
  e.preventDefault()
  const touch = e.changedTouches[0]
  let side = null
  const dropLeft = document.getElementById('dropLeft')
  const dropRight = document.getElementById('dropRight')
  const dropCenter = document.getElementById('dropCenter')
  if (isOverElement(touch.clientX, touch.clientY, dropLeft)) side = 'left'
  else if (isOverElement(touch.clientX, touch.clientY, dropRight)) side = 'right'
  else if (isOverElement(touch.clientX, touch.clientY, dropCenter)) side = 'center'
  else if (isOverElement(touch.clientX, touch.clientY, document.getElementById('boardTiles'))) side = 'right'
  if (side) socket.emit('play', { code: room, tile: [draggedTile.v1, draggedTile.v2], side: side })
  draggedElement.classList.remove('dragging')
  draggedElement.style.position = ''
  draggedElement.style.left = ''
  draggedElement.style.top = ''
  draggedElement.style.zIndex = ''
  draggedElement = null
  draggedTile = null
}

function isOverElement(x, y, element) {
  if (!element || element.classList.contains('hidden')) return false
  const rect = element.getBoundingClientRect()
  return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom
}

function allowDrop(e) { e.preventDefault() }

function drop(e, side) {
  e.preventDefault()
  if (!draggedTile) return
  socket.emit('play', { code: room, tile: [draggedTile.v1, draggedTile.v2], side: side })
  if (draggedElement) draggedElement.classList.remove('dragging')
  draggedElement = null
  draggedTile = null
}

function register() {
  const u = document.getElementById('username').value
  if (!u) return alert('Nome!')
  socket.emit('register', u)
}

socket.on('registered', (data) => {
  myId = data.id
  showScreen('menu-screen')
})

function createRoom() {
  socket.emit('createRoom')
}

socket.on('roomCreated', (data) => {
  room = data.code
  isHost = true
  document.getElementById('myRoomCode').innerText = 'Sua sala: ' + room
  showScreen('wait-screen')
  document.getElementById('waitMessage').innerText = '👑 Aguardando...'
  document.getElementById('startBtn').classList.add('hidden')
})

socket.on('roomList', (rooms) => {
  const ul = document.getElementById('rooms')
  ul.innerHTML = ''
  if (rooms.length === 0) { ul.innerHTML = '<li style="color:#888">Nenhuma</li>'; return }
  rooms.forEach(r => {
    const st = r.players >= 2 ? '🔴 Cheia' : '🟡 ' + r.players + '/2'
    ul.innerHTML += '<li><span><b>' + r.code + '</b> (' + st + ')</span><button class="btn-blue" style="width:auto;padding:5px 10px;" ' + (r.players >= 2 ? 'disabled' : '') + ' onclick="joinRoom(\'' + r.code + '\')">Entrar</button></li>'
  })
})

function joinRoom(code) {
  socket.emit('joinRoom', code)
}

socket.on('roomJoined', (data) => {
  room = data.code
  isHost = false
  showScreen('wait-screen')
  document.getElementById('waitMessage').innerText = '🎲 Aguardando host...'
  document.getElementById('startBtn').classList.add('hidden')
})

socket.on('guestJoined', () => {
  if (isHost) {
    document.getElementById('waitMessage').innerText = '✅ Convidado entrou!'
    document.getElementById('startBtn').classList.remove('hidden')
  }
})

function startGame() {
  if (!room) { alert('Erro: Sala não identificada!'); return }
  socket.emit('startGame', room)
}

socket.on('gameStart', (data) => {
  hand = data.hand
  deck = data.deckCount
  showScreen('game-screen')
  updateTurn('🎮 Jogo Iniciado!')
  renderHand(hand)
  document.getElementById('action-buttons').classList.add('hidden')
  document.getElementById('myCount').innerText = hand.length
  document.getElementById('deckCount').innerText = deck
})

socket.on('tilePlayed', (data) => {
  hand = data.hand
  deck = data.deckCount
  renderHand(hand)
  document.getElementById('myCount').innerText = hand.length
  document.getElementById('deckCount').innerText = deck
  renderBoard(data.board)
  if (data.turn === myId) {
    updateTurn('✅ SUA VEZ!')
    myTurn = true
    checkMoves(data.board)
  } else {
    updateTurn('⏳ Oponente...')
    myTurn = false
    document.getElementById('action-buttons').classList.add('hidden')
    hideZones()
  }
})

socket.on('tileBought', (data) => {
  hand = data.hand
  deck = data.deckCount
  renderHand(hand)
  document.getElementById('myCount').innerText = hand.length
  document.getElementById('deckCount').innerText = deck
  checkMovesAfterBuy(data.board)
})

socket.on('update', (data) => {
  renderBoard(data.board)
  if (data.deckCount !== undefined) {
    deck = data.deckCount
    document.getElementById('deckCount').innerText = deck
  }
  if (data.turn === myId) {
    updateTurn('✅ SUA VEZ!')
    myTurn = true
    checkMoves(data.board)
  } else {
    updateTurn('⏳ Oponente...')
    myTurn = false
    document.getElementById('action-buttons').classList.add('hidden')
    hideZones()
  }
})

function getBoardEnds(board) {
  if (!board || board.length === 0) return { left: null, right: null }
  const first = board[0]
  const last = board[board.length - 1]
  const left = Array.isArray(first) ? first[0] : (first.values ? first.values[0] : null)
  const right = Array.isArray(last) ? last[1] : (last.values ? last.values[1] : null)
  return { left, right }
}

function checkMoves(board) {
  const act = document.getElementById('action-buttons')
  const buy = act.querySelector('.btn-blue')
  const pass = document.getElementById('passBtn')
  const ends = getBoardEnds(board)
  let can = board.length === 0
  if (!can && ends.left !== null && ends.right !== null) {
    can = hand.some(t => {
      const v0 = parseInt(t[0])
      const v1 = parseInt(t[1])
      return (v0 === ends.left || v1 === ends.left || v0 === ends.right || v1 === ends.right)
    })
  }
  if (can) {
    act.classList.add('hidden')
    showZones(board.length === 0)
    updateTurn('✅ SUA VEZ!')
  } else {
    hideZones()
    act.classList.remove('hidden')
    if (deck > 0) {
      buy.classList.remove('hidden')
      pass.classList.add('hidden')
      updateTurn('⚠️ Compre!')
    } else {
      buy.classList.add('hidden')
      pass.classList.remove('hidden')
      updateTurn('⚠️ Passe!')
    }
  }
}

function checkMovesAfterBuy(board) {
  const ends = getBoardEnds(board)
  let can = board.length === 0
  if (!can && ends.left !== null && ends.right !== null) {
    can = hand.some(t => {
      const v0 = parseInt(t[0])
      const v1 = parseInt(t[1])
      return (v0 === ends.left || v1 === ends.left || v0 === ends.right || v1 === ends.right)
    })
  }
  if (can) {
    document.getElementById('action-buttons').classList.add('hidden')
    showZones(board.length === 0)
    updateTurn('✅ SUA VEZ!')
  } else {
    hideZones()
    document.getElementById('action-buttons').classList.remove('hidden')
    if (deck > 0) {
      document.getElementById('passBtn').classList.add('hidden')
      updateTurn('⚠️ Compre novamente!')
    } else {
      document.getElementById('passBtn').classList.remove('hidden')
      updateTurn('⚠️ Passe!')
    }
  }
}

function buyTile() {
  if (myTurn && room) {
    socket.emit('buyTile', { code: room })
    document.getElementById('action-buttons').classList.add('hidden')
  }
}

function passTurn() {
  if (myTurn && room) {
    socket.emit('passTurn', { code: room })
    document.getElementById('action-buttons').classList.add('hidden')
  }
}

function renderHand(h) {
  if (!h || !Array.isArray(h)) return
  document.getElementById('hand').innerHTML = h.map((t, i) => createDomino(t[0], t[1], 'horizontal', true)).join('')
}

// 🔥 RENDERIZA BOARD COM ROTAÇÃO DAS PEDRAS
function renderBoard(b) {
  if (!b || !Array.isArray(b)) return
  document.getElementById('boardTiles').innerHTML = b.map(t => {
    if (!t) return ''
    // 🔥 SUPORTA ARRAY [2,5] OU OBJETO {values: [2,5], rotation: 'vertical'}
    let v0, v1, rotation = 'horizontal'
    if (Array.isArray(t)) {
      v0 = t[0]
      v1 = t[1]
    } else if (t.values) {
      v0 = t.values[0]
      v1 = t.values[1]
      rotation = t.rotation || 'horizontal'
    } else {
      return ''
    }
    return createDomino(v0, v1, rotation)
  }).join('')
}

function showZones(first) {
  document.getElementById('dropCenter').classList.toggle('hidden', !first)
  document.getElementById('dropLeft').classList.toggle('hidden', first)
  document.getElementById('dropRight').classList.toggle('hidden', first)
}

function hideZones() {
  document.getElementById('dropCenter').classList.add('hidden')
  document.getElementById('dropLeft').classList.add('hidden')
  document.getElementById('dropRight').classList.add('hidden')
}

function updateTurn(m) {
  const el = document.getElementById('turn')
  el.innerText = m
  el.classList.toggle('active', m.includes('SUA VEZ'))
}

socket.on('error', (data) => { alert('Erro: ' + data.message) })
socket.on('gameOver', () => { alert('🏆 Fim de jogo!'); location.reload() })
</script>
